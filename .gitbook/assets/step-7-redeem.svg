  <g transform="translate(80,108)">
    <text font-size="11" letter-spacing="0.18em" fill="rgba(240,240,240,0.42)" y="0">USER JOURNEY · STEP 6</text>
    <text font-size="32" font-weight="500" letter-spacing="-0.025em" fill="#F0F0F0" y="38">Redeem anytime, from anywhere.</text>
    <text font-size="14" fill="rgba(240,240,240,0.62)" y="68">Request creates an ERC-721 receipt. After the next clearing cycle, claim returns the underlying.</text>
  </g>

  
  <g transform="translate(80,206)" font-family="&#34;Hanken Grotesk&#34;,&#34;Inter&#34;,system-ui,sans-serif">
    <text font-size="10" letter-spacing="0.18em" fill="rgba(240,240,240,0.42)" y="0">PHASE A · REQUEST  (synchronous)</text>
  </g>
  <g transform="translate(1020,206)" font-family="&#34;Hanken Grotesk&#34;,&#34;Inter&#34;,system-ui,sans-serif">
    <text font-size="10" letter-spacing="0.18em" fill="rgba(240,240,240,0.42)" y="0">PHASE B · CLAIM  (asynchronous · automated)</text>
  </g>

  
  <line x1="120" y1="356" x2="1480" y2="356" stroke="rgba(240,240,240,0.10)" stroke-dasharray="2 6"></line>

  
  <g transform="translate(80,244)">
