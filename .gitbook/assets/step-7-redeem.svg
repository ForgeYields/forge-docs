    <text font-size="13" fill="rgba(240,240,240,0.62)" x="14" y="22">Funds stay earning until the last moment.</text>
  </g>
  <g transform="translate(1460,598)">
    <text font-size="11" letter-spacing="0.14em" fill="rgba(240,240,240,0.42)" y="0" text-anchor="end">06 / 06</text>
  </g>
  <g transform="translate(800,596)">
    <text font-size="12" fill="rgba(240,240,240,0.55)" y="0" text-anchor="middle">Async by design — limits liquidity-extraction risk.</text>
  </g>
