    <text font-size="11" font-family="ui-monospace,&#34;SF Mono&#34;,Menlo,monospace" fill="rgba(240,240,240,0.78)" x="730" y="468" text-anchor="middle">returned to receiver</text>
    <text font-size="10" letter-spacing="0.06em" fill="rgba(240,240,240,0.42)" x="730" y="494" text-anchor="middle">on the chain they redeemed from</text>
  </g>

  
  <g transform="translate(80,430)">
    <rect width="200" height="96" rx="3" fill="transparent" stroke="rgba(240,240,240,0.55)" stroke-width="1.25"></rect>
    <text font-size="10" letter-spacing="0.18em" fill="rgba(240,240,240,0.55)" x="18" y="28">EXTERNAL</text>
    <text font-size="18" font-weight="500" fill="#F0F0F0" letter-spacing="-0.015em" x="18" y="56">User Wallet</text>
