    <text font-size="22" font-weight="500" fill="#F0F0F0" letter-spacing="-0.015em" x="20" y="64">Redeem NFT</text>
    <line x1="20" y1="80" x2="260" y2="80" stroke="rgba(240,240,240,0.10)"></line>
