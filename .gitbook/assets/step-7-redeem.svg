    <text font-size="18" font-weight="500" fill="#F0F0F0" letter-spacing="-0.015em" x="18" y="56">Underlying assets</text>
    <text font-size="11" fill="rgba(240,240,240,0.62)" x="18" y="78">USDC / ETH / etc.</text>
  </g>

  
  <g>
