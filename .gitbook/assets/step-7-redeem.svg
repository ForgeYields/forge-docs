    <text font-size="10" letter-spacing="0.18em" fill="rgba(240,240,240,0.42)" x="18" y="28">L3 · POOL</text>
    <text font-size="18" font-weight="500" fill="#F0F0F0" letter-spacing="-0.015em" x="18" y="56">Withdrawal pool</text>
    <text font-size="11" fill="rgba(240,240,240,0.62)" x="18" y="78">processes epoch N</text>
  </g>

  
  <g>
    <path d="M 1400 292 C 1450 292, 1480 320, 1480 380 L 1480 430 C 1480 460, 1450 478, 1400 478" fill="none" stroke="#738BFF" stroke-width="1.25" marker-end="url(#arrowBlue)"></path>
    <g transform="translate(1290,382)">
      <text font-size="11" font-family="ui-monospace,&#34;SF Mono&#34;,Menlo,monospace" fill="#738BFF" x="0" y="0" text-anchor="middle">claimRedeem(id)</text>
      <text font-size="10" letter-spacing="0.06em" fill="rgba(240,240,240,0.42)" x="0" y="16" text-anchor="middle">relayer · auto</text>
    </g>
  </g>

  
  <g transform="translate(1180,430)">
    <rect width="220" height="96" rx="3" fill="#101218" stroke="rgba(240,240,240,0.22)"></rect>
