      <text x="20" y="122">shares  X</text>
    </g>
    
    <g transform="translate(218,98)" font-family="ui-monospace,&#34;SF Mono&#34;,Menlo,monospace">
      <rect x="-2" y="-14" width="46" height="20" rx="3" fill="rgba(115,139,255,0.10)" stroke="rgba(115,139,255,0.40)"></rect>
      <text font-size="10" fill="#738BFF" x="20" y="0" text-anchor="middle">#0x7a</text>
    </g>
  </g>

  
