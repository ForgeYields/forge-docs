    <text font-size="13" font-weight="500" fill="#738BFF" letter-spacing="0.02em" x="950" y="312" text-anchor="middle">net delta</text>
    <text font-size="11" font-family="ui-monospace,&#34;SF Mono&#34;,Menlo,monospace" fill="rgba(240,240,240,0.62)" x="950" y="354" text-anchor="middle">+ 195,900 USDC</text>
  </g>

  
  <g transform="translate(1120,250)">
    <rect width="380" height="152" rx="3" fill="#101218" stroke="#738BFF" stroke-width="1.5"></rect>
    <rect width="380" height="152" rx="3" fill="#738BFF" opacity="0.05"></rect>
    <text font-size="11" letter-spacing="0.18em" fill="#738BFF" x="22" y="34">COORDINATION LAYER</text>
    <text font-size="32" font-weight="500" fill="#F0F0F0" letter-spacing="-0.025em" x="22" y="80">Controller</text>
    <text font-size="13" fill="rgba(240,240,240,0.62)" x="22" y="104">Starknet · settles every epoch</text>
    <g transform="translate(22,118)">
      <rect x="-2" y="-12" width="160" height="20" rx="10" fill="rgba(240,240,240,0.04)" stroke="rgba(240,240,240,0.18)"></rect>
      <circle cx="10" cy="-2" r="2.5" fill="#5DBA88"></circle>
      <text font-size="11" letter-spacing="0.06em" fill="rgba(240,240,240,0.78)" x="22" y="2">epoch N · clearing</text>
    </g>
