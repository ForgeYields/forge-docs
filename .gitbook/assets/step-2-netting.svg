    <text x="32" y="16" font-size="13" font-weight="500" fill="#F0F0F0" letter-spacing="-0.02em">ForgeYields</text>
  </g>
  <text x="1560" y="56" font-size="11" letter-spacing="0.14em" fill="rgba(240,240,240,0.42)" text-anchor="end">STEP 02 · NETTING</text>

  <g transform="translate(80,108)">
    <text font-size="11" letter-spacing="0.18em" fill="rgba(240,240,240,0.42)" y="0">USER JOURNEY · STEP 2</text>
    <text font-size="32" font-weight="500" letter-spacing="-0.025em" fill="#F0F0F0" y="38">Netting and settlement.</text>
    <text font-size="14" fill="rgba(240,240,240,0.62)" y="68">Hundreds of chain-level flows collapse into one cross-chain net delta, coordinated on Starknet.</text>
  </g>

  
  
  <g transform="translate(100,222)">
