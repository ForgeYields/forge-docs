      <line x1="20" y1="124" x2="140" y2="124" stroke="rgba(240,240,240,0.30)" marker-end="url(#arrowFaint)"></line>
      <text x="150" y="128">+ 6,300 USDC</text>
    </g>
  </g>

  
  <g transform="translate(100,392)">
