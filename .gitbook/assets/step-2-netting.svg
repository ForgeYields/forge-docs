  <g transform="translate(100,572)">
    <rect x="-22" y="-22" width="3" height="60" fill="#738BFF" opacity="0.6"></rect>
    <text font-size="11" letter-spacing="0.14em" fill="rgba(240,240,240,0.42)" y="-2">RESULT</text>
    <text font-size="14" fill="rgba(240,240,240,0.62)" y="22">Hundreds of user-level flows → one cross-chain net delta.</text>
  </g>
  <g transform="translate(1120,592)">
