    <text font-size="11" letter-spacing="0.18em" fill="rgba(240,240,240,0.42)" x="20" y="28">CHAIN · ETHEREUM</text>
    <text font-size="13" font-weight="500" fill="#F0F0F0" x="20" y="50">Deposits &amp; redeems</text>
    <g font-family="ui-monospace,&#34;SF Mono&#34;,Menlo,monospace" font-size="11" fill="rgba(240,240,240,0.62)">
      <line x1="20" y1="70" x2="170" y2="70" stroke="rgba(240,240,240,0.30)" marker-end="url(#arrowFaint)"></line>
