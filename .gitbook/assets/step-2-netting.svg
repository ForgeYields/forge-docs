      <text x="190" y="128">− 18,900 USDC</text>
    </g>
  </g>

  
  <text font-size="11" letter-spacing="0.14em" fill="rgba(240,240,240,0.42)" x="100" y="200">USER-LEVEL FLOWS · MANY</text>

  
  <g>
    
    <g stroke="rgba(240,240,240,0.20)" fill="none">
      <path d="M 482 250 C 600 250, 700 290, 780 326"></path>
      <path d="M 482 288 C 600 288, 700 304, 780 326"></path>
      <path d="M 482 326 L 780 326"></path>
      <path d="M 482 360 C 600 360, 700 344, 780 326"></path>
      <path d="M 482 420 C 600 420, 700 372, 780 326"></path>
      <path d="M 482 460 C 600 460, 700 392, 780 326"></path>
      <path d="M 482 498 C 600 498, 700 412, 780 326"></path>
    </g>
    
    <g transform="translate(700,210)">
      <rect width="200" height="28" rx="14" fill="rgba(115,139,255,0.06)" stroke="rgba(115,139,255,0.40)"></rect>
      <text font-size="11" letter-spacing="0.14em" fill="#738BFF" x="100" y="18" text-anchor="middle">BATCHED AT ROLLUP LEVEL</text>
    </g>
    
    <circle cx="780" cy="326" r="6" fill="#101218" stroke="rgba(240,240,240,0.55)"></circle>
  </g>

  
  <g>
